steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/trellis-frontend:latest'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_VAPID_KEY=${_VITE_FIREBASE_VAPID_KEY}'
      - '--build-arg'
      - 'VITE_API_URL=${_VITE_API_URL}'
      - '--build-arg'
      - 'VITE_WS_URL=${_VITE_WS_URL}'
      - '.'
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/trellis-frontend:latest'

substitutions:
  _REGION: us-central1
  _REPO: trellis
  _VITE_FIREBASE_API_KEY: REPLACE_ME
  _VITE_FIREBASE_AUTH_DOMAIN: REPLACE_ME
  _VITE_FIREBASE_PROJECT_ID: REPLACE_ME
  _VITE_FIREBASE_STORAGE_BUCKET: REPLACE_ME
  _VITE_FIREBASE_MESSAGING_SENDER_ID: REPLACE_ME
  _VITE_FIREBASE_APP_ID: REPLACE_ME
  _VITE_FIREBASE_VAPID_KEY: REPLACE_ME
  _VITE_API_URL: REPLACE_ME
  _VITE_WS_URL: REPLACE_ME

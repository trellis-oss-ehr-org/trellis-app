steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'api/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/trellis-api:latest'
      - '.'
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/trellis-api:latest'

substitutions:
  _REGION: us-central1
  _REPO: trellis

services:
  db:
    image: postgres:15
    container_name: trellis-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trellis_test
    ports:
      - "${TRELLIS_TEST_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trellis_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - trellis-test-postgres:/var/lib/postgresql/data

volumes:
  trellis-test-postgres:
